{% extends "base.html" %}

{% block title %}
	&raquo; MOP Contracts &raquo; Add
{% endblock %}

{% block nav %}
	<a href="/e/mop_contracts">MOP Contracts</a> &raquo; Add
{% endblock %}

{% block content %}
	<form method="post">
		<fieldset>
			<legend>Add a MOP contract</legend>
			<label>Participant</label>
			<select name="participant_id">
				{% for party in parties %}
					{{ input_option('participant_id', party.id,
							party.participant.code + " : " + party.name + " : " + party.market_role.description) }}
				{% endfor %}
			</select>
			<label>Name</label> {{input_text('name')}}
			<label>Start Date</label> {{ input_date('start') }}

			<input type="submit" value="Add">
		</fieldset>
	</form>
{% endblock %}
