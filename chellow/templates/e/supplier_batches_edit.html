{% extends "base.html" %}

{% block title %}
	&raquo; Supplier Contracts &raquo; {{contract.name}} &raquo; Batches
{% endblock %}

{% block nav %}
	<a href="/e/supplier_contracts">Supplier Contracts</a> &raquo; 
	<a href="/e/supplier_contracts/{{contract.id}}">{{contract.name}}</a> &raquo; 
	<a href="/e/supplier_contracts/{{contract.id}}/batches">Batches</a> &raquo;
	Edit
{% endblock %}

{% block content %}
	<form hx-post="/e/supplier_contracts/{{contract.id}}/batches/edit"
			hx-confirm="Are you sure you want to delete all the bills in all of the batches and then re-import bills from the files?"
	>
		<fieldset>
			<button name="delete_import_bills">Re-Import Bills</button>
		</fieldset>
	</form>
{% endblock %}
